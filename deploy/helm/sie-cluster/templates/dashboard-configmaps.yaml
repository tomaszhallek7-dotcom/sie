{{- if or (index .Values "kube-prometheus-stack" "install") .Values.dashboards.enabled }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sie-cluster.fullname" . }}-dashboard-cluster
  namespace: {{ include "sie-cluster.namespace" . }}
  labels:
    {{- include "sie-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
    grafana_dashboard: "1"
  annotations:
    grafana_folder: SIE
data:
  sie-cluster-overview.json: |-
{{ .Files.Get "files/dashboards/cluster-overview.json" | indent 4 }}

