{{- /* This Job runs in two scenarios:
       (a) Bundle on:    fail if a cert-manager controller is ALREADY present (collision check).
       (b) Bundle off + cert-manager-dependent mode (self-signed, trust-manager, trustBundle):
           fail if cert-manager is NOT present (presence check).
       Both cases share the label-based detection logic and the same RBAC. */ -}}
{{- $tlsMode := .Values.ingress.tls.mode }}
{{- $needsCm := or .Values.certManagerBundle.trustManager.install .Values.certManagerBundle.trustBundle.enabled (and .Values.ingress.tls.enabled (or (eq $tlsMode "self-signed") (eq $tlsMode "cert-manager"))) }}
{{- $bundleOn := .Values.certManagerBundle.certManager.install }}
{{- if or $bundleOn $needsCm }}
{{- $fullname := include "sie-cluster.fullname" . }}
{{- $ns := include "sie-cluster.namespace" . }}
{{- $saName := include "sie-cluster.certManagerConflict.serviceAccountName" . }}
{{- $crName := printf "%s-cm-conflict-check" $fullname | trunc 63 | trimSuffix "-" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $saName }}
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: sie-cm-conflict-check
    app.kubernetes.io/component: cert-manager-bundle
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-10"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $crName }}
  labels:
    app.kubernetes.io/name: sie-cm-conflict-check
    app.kubernetes.io/component: cert-manager-bundle
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-10"
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $crName }}
  labels:
    app.kubernetes.io/name: sie-cm-conflict-check
    app.kubernetes.io/component: cert-manager-bundle
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-10"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $crName }}
subjects:
  - kind: ServiceAccount
    name: {{ $saName }}
    namespace: {{ $ns }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-cm-conflict-check-%d" $fullname .Release.Revision | trunc 63 | trimSuffix "-" }}
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: sie-cm-conflict-check
    app.kubernetes.io/component: cert-manager-bundle
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-9"
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 120
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sie-cm-conflict-check
        app.kubernetes.io/component: cert-manager-bundle
    spec:
      serviceAccountName: {{ $saName }}
      restartPolicy: Never
      containers:
        - name: check
          image: alpine/k8s:1.29.10
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              ALLOW_EXISTING="{{ .Values.certManagerBundle.allowExistingCRDs }}"
              RELEASE_NS="{{ include "sie-cluster.namespace" . }}"
              BUNDLE_ON="{{ $bundleOn }}"
              NEEDS_CM="{{ $needsCm }}"
              echo "=== cert-manager controller check (bundle=$BUNDLE_ON, needs_cm=$NEEDS_CM) ==="
              # CRDs are vendored under crds/ and applied by every install, so checking for CRD
              # existence would always false-positive. Probe cluster-wide for any Deployment carrying
              # the canonical cert-manager labels — that catches the standard
              # `helm install cert-manager` release name, non-standard ones like `cert-manager-upstream`,
              # AND installs in unconventional namespaces.
              FOUND="$(kubectl get deployment -A \
                -l "app.kubernetes.io/name=cert-manager,app.kubernetes.io/component=controller" \
                -o jsonpath='{range .items[*]}{.metadata.namespace}/{.metadata.name}{"\n"}{end}' \
                2>/dev/null | head -n 1 || true)"

              if [ "$BUNDLE_ON" = "true" ] && [ -n "$FOUND" ]; then
                if [ "$ALLOW_EXISTING" = "true" ]; then
                  echo "WARN: cert-manager controller found at $FOUND, but certManagerBundle.allowExistingCRDs=true — proceeding. Two controllers reconciling the same CRDs WILL corrupt issuance state."
                  exit 0
                fi
                cat <<EOF
              FAILED: a cert-manager controller Deployment is already present at $FOUND.
              Refusing to install bundled cert-manager because two controllers reconciling
              the same CRDs will corrupt issuance state.
              Remediation:
                (a) set certManagerBundle.certManager.install=false and use ingress.tls.mode=cert-manager
                    against the existing install, OR
                (b) uninstall the existing cert-manager first, OR
                (c) set certManagerBundle.allowExistingCRDs=true (DANGEROUS).
              EOF
                exit 1
              fi

              if [ "$BUNDLE_ON" != "true" ] && [ "$NEEDS_CM" = "true" ] && [ -z "$FOUND" ]; then
                cat <<EOF
              FAILED: this configuration requires cert-manager, but no cert-manager controller
              Deployment was found (probed labels app.kubernetes.io/name=cert-manager,
              app.kubernetes.io/component=controller across all namespaces).
              Remediation:
                (a) install cert-manager separately before re-running helm install/upgrade, OR
                (b) bundle it via certManagerBundle.certManager.install=true.
              EOF
                exit 1
              fi

              echo "OK: cert-manager state matches the requested configuration."
              exit 0
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
{{- end }}
