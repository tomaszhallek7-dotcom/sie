# ConfigMap containing available GPU types and machine profiles for the cluster
# Gateway reads this to report available GPUs/profiles even when workers are scaled to zero
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sie-cluster.fullname" . }}-gpu-config
  namespace: {{ include "sie-cluster.namespace" . }}
  labels:
    {{- include "sie-cluster.labels" . | nindent 4 }}
data:
  # Comma-separated list of canonical machine profiles for routing validation
  # and default pool display. Request aliases live in gpu-aliases below so raw
  # GPU labels and WorkerGroup names do not leak into default.spec.gpus.
  {{- $gpuTypes := list }}
  {{- $gpuAliases := dict }}
  {{- range $poolName, $pool := .Values.workers.pools }}
  {{- if $pool.enabled }}
  {{- $machineProfile := default $pool.gpuType $pool.machineProfile }}
  {{- $gpuTypes = append $gpuTypes $machineProfile }}
  {{- $_ := set $gpuAliases $machineProfile $machineProfile }}
  {{- if and $pool.gpuType (ne $pool.gpuType $machineProfile) (not (hasKey $gpuAliases $pool.gpuType)) }}
  {{- $_ := set $gpuAliases $pool.gpuType $machineProfile }}
  {{- end }}
  {{- if and (ne $poolName $machineProfile) (ne $poolName $pool.gpuType) (not (hasKey $gpuAliases $poolName)) }}
  {{- $_ := set $gpuAliases $poolName $machineProfile }}
  {{- end }}
  {{- end }}
  {{- end }}
  available-gpus: {{ join "," ($gpuTypes | uniq) | quote }}
  gpu-aliases: {{ $gpuAliases | toJson | quote }}
  # Machine profiles JSON for gateway (used for pool validation and routing)
  # Format: {"profile_name": {"gpuType": "...", "machineType": "...", "spot": bool}}
  machine-profiles: |
    {{- $profiles := dict }}
    {{- range $name, $profile := .Values.machineProfiles }}
    {{- $_ := set $profiles $name $profile }}
    {{- end }}
    {{ $profiles | toJson }}
