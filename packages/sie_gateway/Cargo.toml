[package]
name = "sie-gateway"
version = "0.4.0"
edition = "2021"
publish = false

[[bin]]
name = "sie-gateway"
path = "src/main.rs"

[dependencies]
axum = { version = "0.8", features = ["ws"] }
base64 = "0.22"
tokio = { version = "1", features = ["full"] }
tokio-stream = { version = "0.1", features = ["sync"] }
hyper = { version = "1", features = ["full"] }
hyper-util = { version = "0.1", features = ["tokio"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
tokio-tungstenite = "0.26"
futures-util = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
clap = { version = "4", features = ["derive", "env"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }
prometheus = { version = "0.13", features = ["process"] }
thiserror = "2"
dashmap = "6"
tower = "0.5"
tower-http = { version = "0.6", features = ["cors"] }
bytes = "1"

# Phase 4: Model registry + hot reload
arc-swap = "1"
sha2 = "0.10"
notify = "6"

# Phase 5: Auth
subtle = "2"

# Phase 6: Kubernetes discovery
kube = { version = "0.98", features = ["runtime", "derive"] }
k8s-openapi = { version = "0.24", features = ["latest"] }
rand = "0.8"

# Phase 7: Pool management (chrono for DateTime)
chrono = { version = "0.4", features = ["serde"] }

# Phase 11: Request coalescing (MD5 for params hash)
md-5 = "0.10"

# HRW direct-dispatch routing (xxh3 64-bit hashing of routing keys)
xxhash-rust = { version = "0.8", features = ["xxh3"] }

# Phase 8: NATS integration
async-nats = "0.38"
uuid = { version = "1", features = ["v4", "v7"] }

# Phase 10: Queue mode (msgpack serialization)
rmp-serde = "1"
rmp = "0.8"
rmpv = { version = "1", features = ["with-serde"] }

# Async traits and filesystem locking
async-trait = "0.1"
fs2 = "0.4"
serde_bytes = "0.11"
percent-encoding = "2"

# Cloud config store backends (opt-in)
object_store = { version = "0.11", optional = true, features = ["aws", "gcp"] }
url = { version = "2", optional = true }
utoipa = "5.4.0"

# W3C Trace Context propagation (M5+). The gateway extracts the
# inbound `traceparent` / `tracestate` HTTP headers, opens a child
# span around proxy/publish, and injects the resulting context into
# the JetStream work envelope so the worker can continue the trace.
#
# Versions tracked together — the 0.24/0.17/0.25 set is the latest
# mutually-compatible point release as of this addition. OTel does
# break compat across minor versions; bumping requires updating all
# four lines.
opentelemetry = "0.24"
opentelemetry_sdk = { version = "0.24", features = ["rt-tokio"] }
opentelemetry-otlp = { version = "0.17", default-features = false, features = ["grpc-tonic", "trace"] }
opentelemetry-http = "0.13"
tracing-opentelemetry = "0.25"

[features]
default = []
cloud-storage = ["dep:object_store", "dep:url"]
# Compile-in the raw-routing-key field on `RoutingKeyResolved` and the
# `SIE_ROUTING_LOG_RAW` env-var read paths. Without this feature, raw
# routing keys CANNOT appear in logs regardless of the env var — the
# fields and code paths simply don't exist in the binary. Off by default
# so production release builds are privacy-safe at compile time.
raw-routing-logs = []

[dev-dependencies]
tempfile = "3"
http = "1"
tower = { version = "0.5", features = ["util"] }
wiremock = "0.6"
