sie_id: mixedbread-ai/mxbai-edge-colbert-v0-32m
hf_id: mixedbread-ai/mxbai-edge-colbert-v0-32m
inputs:
  text: true
  image: false
  audio: false
  video: false
tasks:
  encode:
    dense: null
    sparse: null
    multivector:
      dim: 64
  score: {}
  extract: null
max_sequence_length: 8192
profiles:
  default:
    max_batch_tokens: 16384
    compute_precision: null
    adapter_path: sie_server.adapters.colbert_modernbert_flash:ColBERTModernBERTFlashAdapter
    adapter_options:
      loadtime:
        muvera_config:
          num_repetitions: 20
          num_simhash_projections: 6
          projection_dim: 8
        token_dim: 64
        normalize: true
        query_max_length: 32
        skip_special_tokens: false
      runtime:
        muvera: null
  muvera:
    extends: default
    adapter_options:
      runtime:
        muvera: {}
        output_types:
        - dense
        output_similarity:
          dense: dot
