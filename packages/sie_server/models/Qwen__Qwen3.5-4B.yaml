sie_id: Qwen/Qwen3.5-4B
hf_id: Qwen/Qwen3.5-4B
inputs:
  # Qwen3.5-4B is a unified vision-language model (Gated DeltaNet + sparse MoE
  # with an integrated vision encoder). The wire surface accepts text+image
  # via the OpenAI chat-completions schema (``image_url`` content parts);
  # video is documented by Qwen but not yet wired through the SIE gateway.
  text: true
  image: true
  audio: false
  video: false
tasks:
  generate:
    # Native context length is 262,144 tokens (YaRN extends to ~1M).
    # The 8192 default here matches what the L4 profile can actually fit
    # (see §"Empirical KV calibration" below). A100/H100 profiles
    # raise this on a per-profile basis.
    context_length: 8192
    max_output_tokens: 4096
    capabilities:
      # NOTE: scoped to what the production backend (``outlines``, set
      # per-profile under ``adapter_options.loadtime``) actually supports
      # on SGLang. SGLang's outlines_backend explicitly skips ebnf with
      # ``Skip unsupported key_type='ebnf'`` — confirmed on A100 smoke
      # 2026-05-26 (see ``benchmarks/generation/qwen35-outlines-smoke/``).
      # If an operator switches a Qwen3.5 profile to ``grammar_backend:
      # xgrammar`` they should re-add ``"ebnf"`` here — xgrammar smoke on
      # the same hardware passed all three modes (regex/json_schema/ebnf).
      grammar: ["json_schema", "regex"]
      streaming: true
      tools: true
    # Grammar backend: ``outlines`` (set per-profile under
    # ``adapter_options.loadtime``). Earlier revisions forced ``xgrammar``
    # here because the worker-side Outlines preflight (``compile_outlines``)
    # crashed on Qwen3.5 with ``'TokenizersBackend' object has no attribute
    # 'vocabulary'`` — it passed the raw transformers>=5 tokenizer straight
    # to Outlines' processor factories. That preflight now wraps the
    # tokenizer in Outlines' ``TransformerTokenizer`` adapter (the same wrap
    # SGLang does internally), so ``outlines`` works for json_schema/regex.
    # EBNF is *not* in capabilities because SGLang's outlines_backend does
    # not implement it (the smoke surfaces this with a 400). If you need
    # EBNF on Qwen3.5, switch the profile to ``grammar_backend: xgrammar``
    # and re-add ``"ebnf"`` to the capability list above.
    # Qwen3.5 emits ``<think>...</think>`` reasoning by default
    # ("Qwen3.5 will think by default before response", per model card).
    # We disable it for the benchmark / OpenAI-compat path so the
    # visible output is the answer only. Operators wanting CoT can
    # flip this profile-side.
    chat_template_kwargs:
      enable_thinking: false
    prewarm_grammars:
      # NOTE: Outlines regexes are IMPLICITLY ANCHORED and its FSM engine
      # (interegular) rejects ``^``/``$`` anchors with
      # ``interegular.patterns.Unsupported`` — which, unhandled inside
      # SGLang's scheduler thread, SIGQUITs the whole server. XGrammar
      # tolerated anchors; Outlines does not. So write the bare pattern
      # (``(yes|no)``, not ``^(yes|no)$``). The worker-side preflight
      # (``compile_outlines``) catches a stray anchored regex as
      # ``grammar_compile_failed`` before it can reach — and crash — SGLang.
      - name: yes_no
        kind: regex
        value: "(yes|no)"
      - name: short_answer
        kind: json_schema
        value:
          type: object
          properties:
            answer:
              type: string
          required: [answer]
max_sequence_length: 8192
# ── KV-cache math (empirical, 2026-05-18) ──
#
# Qwen3.5-4B uses a hybrid Gated DeltaNet + Gated Attention architecture
# where 24 of 32 layers are recurrent (DeltaNet) and only 8 are KV-cache
# bearing (Gated Attention with 4 KV heads × head_dim=256). The mamba
# scheduler reserves additional state buffers for the recurrent layers
# (``--mamba-scheduler-strategy extra_buffer`` is required for NEXTN spec
# decoding to coexist with the radix cache). Effective KV memory ends up
# much smaller than a comparable dense 4B model because the recurrent
# buffer eats roughly ``mamba_full_memory_ratio=0.9`` of the static
# allocation.
#
# Empirical SGLang ``/get_server_info`` dump (sglang 0.5.10, NEXTN on,
# ``--mamba-scheduler-strategy extra_buffer``):
#
#   L4 (22 GB), mem_fraction_static=0.90, context_length=2048 OR 8192:
#     weight=8.62 GB, kvcache=0.96 GB, token_capacity=31,610
#     effective_max_running_requests_per_dp = 3
#     (context_length above 8192 OOMs on L4)
#
#   A100-40GB, mem_fraction_static=0.85, context_length=32768:
#     max_total_num_tokens=847,848, max_req_input_len=32,762
#     effective_max_running_requests_per_dp = 48
#
# ``kv_budget_tokens`` is sized at ``token_capacity / 4``, matching the
# pattern set by Qwen3-4B-Instruct-2507. Re-calibrate via the smoke
# tool ``tools/smoke_qwen35_4b.py`` if SGLang version or
# ``mem_fraction_static`` changes.
profiles:
  # L4 is severely constrained for Qwen3.5-4B + NEXTN — fits only ~3
  # concurrent requests, context cap ≈ 8192. The gating subset's
  # ``concurrencies: [1, 16]`` axis will saturate at 3 on L4; treat L4
  # as smoke / c=1 only. Use a100-40gb (below) for c=16 cells.
  default:
    max_batch_tokens: 8192
    compute_precision: bfloat16
    adapter_path: sie_server.adapters.sglang.generation:SGLangGenerationAdapter
    # Empirical: 31,610 / 4 = 7,902 → round to 7,168 (= 7 × 1024).
    kv_budget_tokens: 7168
    adapter_options:
      loadtime:
        # Empirical floor on L4 — anything lower OOMs at model load.
        mem_fraction_static: 0.90
        served_model_name: Qwen/Qwen3.5-4B
        disable_cuda_graph: true
        attention_backend: triton
        grammar_backend: outlines
        reasoning_parser: qwen3
        tool_call_parser: qwen3_coder
        # NEXTN/MTP per the Qwen3.5-4B model card recipe. SGLang 0.5.10
        # implements NEXTN under the EAGLE codepath internally; the
        # ``/server_info`` dump reports ``speculative_algorithm: EAGLE``
        # — that is expected and not a misconfiguration.
        speculative:
          enabled: true
          algorithm: nextn
          num_steps: 3
          eagle_topk: 1
          num_draft_tokens: 4
        # Required for NEXTN spec decoding to coexist with radix cache
        # on Qwen3.5's hybrid Gated DeltaNet architecture. The adapter
        # also sets the SGLANG_ENABLE_SPEC_V2=1 env var when
        # speculative.enabled — both are required as a pair.
        extra_launch_args:
          - "--mamba-scheduler-strategy"
          - "extra_buffer"
          - "--disable-overlap-schedule"
      runtime:
        first_chunk_timeout_s: 60
        inter_chunk_timeout_s: 10
        overall_timeout_s: 300
        default_sampling:
          temperature: 0.7
          top_p: 0.8
          presence_penalty: 1.5
        stop_tokens:
          - "<|im_end|>"
  a100-40gb:
    max_batch_tokens: 32768
    compute_precision: bfloat16
    adapter_path: sie_server.adapters.sglang.generation:SGLangGenerationAdapter
    # Empirical: 847,848 / 4 = 211,962 → round to 210,944 (= 206 × 1024).
    kv_budget_tokens: 210944
    adapter_options:
      loadtime:
        mem_fraction_static: 0.85
        served_model_name: Qwen/Qwen3.5-4B
        disable_cuda_graph: true
        attention_backend: triton
        grammar_backend: outlines
        reasoning_parser: qwen3
        tool_call_parser: qwen3_coder
        speculative:
          enabled: true
          algorithm: nextn
          num_steps: 3
          eagle_topk: 1
          num_draft_tokens: 4
        extra_launch_args:
          - "--mamba-scheduler-strategy"
          - "extra_buffer"
      runtime:
        first_chunk_timeout_s: 60
        inter_chunk_timeout_s: 10
        overall_timeout_s: 300
        default_sampling:
          temperature: 0.7
          top_p: 0.8
          presence_penalty: 1.5
        stop_tokens:
          - "<|im_end|>"
  h100:
    max_batch_tokens: 65536
    compute_precision: bfloat16
    adapter_path: sie_server.adapters.sglang.generation:SGLangGenerationAdapter
    # Analytical estimate — re-calibrate via ``tools/smoke_qwen35_4b.py``
    # once H100 access is set up. Scales ~2× off the A100-40GB number
    # (80 GB / 40 GB), so ~420k tokens at context=32768.
    kv_budget_tokens: 421888
    adapter_options:
      loadtime:
        mem_fraction_static: 0.85
        served_model_name: Qwen/Qwen3.5-4B
        disable_cuda_graph: true
        attention_backend: triton
        grammar_backend: outlines
        reasoning_parser: qwen3
        tool_call_parser: qwen3_coder
        speculative:
          enabled: true
          algorithm: nextn
          num_steps: 3
          eagle_topk: 1
          num_draft_tokens: 4
        extra_launch_args:
          - "--mamba-scheduler-strategy"
          - "extra_buffer"
      runtime:
        first_chunk_timeout_s: 60
        inter_chunk_timeout_s: 10
        overall_timeout_s: 300
        default_sampling:
          temperature: 0.7
          top_p: 0.8
          presence_penalty: 1.5
        stop_tokens:
          - "<|im_end|>"
  # No-speculative baseline profile — used by the matrix's
  # speculative-on/off ablation cells so SIE-vs-raw-SGLang ratios can be
  # measured independently of NEXTN's contribution.
  no-spec:
    max_batch_tokens: 32768
    compute_precision: bfloat16
    adapter_path: sie_server.adapters.sglang.generation:SGLangGenerationAdapter
    # When speculative is off, KV budget can be higher (no draft KV
    # competing for the static pool). Re-calibrate empirically before
    # using in production.
    kv_budget_tokens: 262144
    adapter_options:
      loadtime:
        mem_fraction_static: 0.85
        served_model_name: Qwen/Qwen3.5-4B
        disable_cuda_graph: true
        attention_backend: triton
        grammar_backend: outlines
        reasoning_parser: qwen3
        tool_call_parser: qwen3_coder
        speculative:
          enabled: false
        # mamba_scheduler_strategy is harmless when speculative is off;
        # the radix-cache compatibility error only fires with spec on.
        # Leaving the flag present keeps both profiles syntactically
        # identical so a config diff between them shows only the
        # speculative block (the intent of the ablation).
        extra_launch_args:
          - "--mamba-scheduler-strategy"
          - "extra_buffer"
      runtime:
        first_chunk_timeout_s: 60
        inter_chunk_timeout_s: 10
        overall_timeout_s: 300
        default_sampling:
          temperature: 0.7
          top_p: 0.8
          presence_penalty: 1.5
        stop_tokens:
          - "<|im_end|>"
  default-no-admission:
    extends: a100-40gb
    admission_enabled: false
