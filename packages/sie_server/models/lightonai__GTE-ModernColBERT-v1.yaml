sie_id: lightonai/GTE-ModernColBERT-v1
hf_id: lightonai/GTE-ModernColBERT-v1
inputs:
  text: true
  image: false
  audio: false
  video: false
tasks:
  encode:
    dense: null
    sparse: null
    multivector:
      dim: 128
  score: {}
  extract: null
max_sequence_length: 8192
profiles:
  default:
    max_batch_tokens: 16384
    compute_precision: null
    adapter_path: sie_server.adapters.colbert_modernbert_flash:ColBERTModernBERTFlashAdapter
    adapter_options:
      loadtime:
        muvera_config:
          num_repetitions: 40
          num_simhash_projections: 6
          projection_dim: null
          final_projection_dim: 10240
        token_dim: 128
        normalize: true
        query_max_length: 32
        skip_special_tokens: false
      runtime: {}
  muvera:
    extends: default
    adapter_options:
      runtime:
        output_types:
        - dense
        output_similarity:
          dense: dot
        muvera: {}
