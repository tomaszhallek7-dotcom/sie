sie_id: answerdotai/answerai-colbert-small-v1
hf_id: answerdotai/answerai-colbert-small-v1
inputs:
  text: true
  image: false
  audio: false
  video: false
tasks:
  encode:
    dense: null
    sparse: null
    multivector:
      dim: 96
  score: {}
  extract: null
max_sequence_length: 512
profiles:
  default:
    max_batch_tokens: 16384
    compute_precision: null
    adapter_path: sie_server.adapters.colbert:ColBERTAdapter
    adapter_options:
      loadtime:
        muvera_config:
          num_repetitions: 20
          num_simhash_projections: 6
          projection_dim: 8
        token_dim: 96
        normalize: true
        query_max_length: 32
        skip_special_tokens: false
        query_expansion: false
        query_prefix: '[Q] '
        doc_prefix: '[D] '
      runtime:
        muvera: null
  muvera:
    extends: default
    adapter_options:
      runtime:
        muvera: {}
        output_types:
        - dense
        output_similarity:
          dense: dot
