name: transformers5
priority: 5
default: false
# Only adapters verified to work with transformers 5.x belong here.
# Do NOT copy all default adapters — they may break with the newer version.
adapters:
- sie_server.adapters.lighton_ocr
- sie_server.adapters.glm_ocr
deps:
  # Transformers 5.x for models requiring newer architecture support
  # (e.g., LightOnOCR-2-1B needs LightOnOcrForConditionalGeneration,
  # GLM-OCR needs GlmOcrForConditionalGeneration)
  transformers: '>=5.0'
  # Pin torch — flash-attn's unpinned torch dep can pull in 2.10+ which breaks torchvision
  torch: '>=2.9,<2.10'
  # No huggingface-hub override: transformers 5.x's own metadata
  # pins it to >=1.3,<2.0. An override here was previously
  # unsatisfiable against that pin and broke `uv run` resolution.
  # Let transformers drive the version.
  pillow: ''
